<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampaignPulse | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
            colors: {
              pulseTeal: "#0D9488",
              pulseBlue: "#2563EB",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased">
    <div class="relative flex min-h-screen items-center justify-center px-4 py-12 sm:px-6">
      <div
        class="pointer-events-none absolute -right-16 -top-16 h-64 w-64 rounded-full bg-gradient-to-br from-pulseTeal/25 to-pulseBlue/25 blur-3xl sm:h-80 sm:w-80"
      ></div>
      <a
        href="index.html"
        aria-label="Go to home page"
        class="absolute right-4 top-4 inline-flex h-11 w-11 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-600 shadow-sm transition hover:border-pulseTeal hover:text-pulseTeal sm:right-6 sm:top-6"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          class="h-5 w-5"
        >
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5.5 9.5V21h13V9.5"></path>
          <path d="M9.5 21v-6h5v6"></path>
        </svg>
      </a>

      <div class="relative w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl sm:p-8">
        <div class="mb-8 text-center">
          <img
            src="images/icon.png"
            alt="CampaignPulse icon"
            class="mx-auto h-12 w-12 object-contain"
          />
          <h1 class="mt-4 text-3xl font-extrabold tracking-tight text-slate-900">Welcome Back</h1>
          <p class="mt-2 text-sm text-slate-500">Sign in to continue to CampaignPulse</p>
        </div>

        <form class="space-y-5" action="#" method="post">
          <button
            type="button"
            class="flex w-full items-center justify-center gap-3 rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="h-5 w-5">
              <path
                fill="#FFC107"
                d="M43.611 20.083H42V20H24v8h11.303C33.656 32.657 29.205 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"
              />
              <path
                fill="#FF3D00"
                d="M6.306 14.691l6.571 4.819C14.655 16.108 18.961 13 24 13c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"
              />
              <path
                fill="#4CAF50"
                d="M24 44c5.169 0 9.861-1.977 13.409-5.192l-6.19-5.238C29.143 35.091 26.715 36 24 36c-5.176 0-9.614-3.317-11.275-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"
              />
              <path
                fill="#1976D2"
                d="M43.611 20.083H42V20H24v8h11.303a12.042 12.042 0 0 1-4.084 5.57h.001l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"
              />
            </svg>
            Sign in with Google
          </button>

          <div class="relative">
            <div class="absolute inset-0 flex items-center" aria-hidden="true">
              <div class="w-full border-t border-slate-200"></div>
            </div>
            <div class="relative flex justify-center">
              <span class="bg-white px-3 text-xs font-medium uppercase tracking-wide text-slate-400">
                or sign in with email
              </span>
            </div>
          </div>

          <div>
            <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
              placeholder="you@example.com"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-pulseTeal focus:ring-2 focus:ring-pulseBlue/30"
            />
          </div>

          <div>
            <label for="password" class="mb-2 block text-sm font-medium text-slate-700">
              Password
            </label>
            <div class="relative">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
                placeholder="Enter your password"
                class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 pr-12 text-sm outline-none transition focus:border-pulseTeal focus:ring-2 focus:ring-pulseBlue/30"
              />
              <button
                id="togglePassword"
                type="button"
                class="absolute inset-y-0 right-3 my-auto h-8 rounded-md px-2 text-xs font-semibold text-slate-500 transition hover:bg-slate-100 hover:text-slate-700"
                aria-label="Show password"
              >
                Show
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between gap-3 text-sm">
            <label for="remember" class="inline-flex cursor-pointer items-center gap-2 text-slate-600">
              <input
                id="remember"
                name="remember"
                type="checkbox"
                class="h-4 w-4 rounded border-slate-300 text-pulseTeal focus:ring-pulseBlue/40"
              />
              Remember me
            </label>
            <a href="#" class="font-medium text-pulseBlue transition hover:text-pulseTeal">
              Forgot password?
            </a>
          </div>

          <button
            type="submit"
            class="w-full rounded-xl bg-gradient-to-r from-pulseTeal to-pulseBlue px-4 py-3 text-sm font-semibold text-white shadow-md transition duration-300 hover:scale-[1.01] focus:outline-none focus:ring-2 focus:ring-pulseBlue/40 focus:ring-offset-2"
          >
            Sign In
          </button>
        </form>
      </div>
    </div>

    <script>
      const togglePasswordButton = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");

      togglePasswordButton.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        togglePasswordButton.textContent = isPassword ? "Hide" : "Show";
        togglePasswordButton.setAttribute(
          "aria-label",
          isPassword ? "Hide password" : "Show password"
        );
      });
    </script>
  </body>
</html>
