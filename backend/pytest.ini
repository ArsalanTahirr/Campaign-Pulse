[pytest]
# Add backend/ to sys.path so `from app.xxx import ...` works without
# having to install the package.
pythonpath = .
testpaths = tests

# Suppress SQLAlchemy and passlib legacy-API deprecation warnings so that
# the test output stays clean (warnings are not errors here; the deprecated
# APIs still work correctly in the current library versions).
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy
    ignore::DeprecationWarning:passlib
    ignore::PendingDeprecationWarning
